<!-- Delete all markers dialog -->
<div id="delete-markers-overlay" class="dialog-overlay hidden">
    <div id="delete-markers-dialog" class="dialog-card">
        <div class="dialog-header">
            <span><i class="fa-solid fa-trash" style="color:var(--accent-color);margin-right:6px;"></i>Delete all markers?</span>
            <button id="delete-markers-close" class="dialog-close-btn" title="Close">&times;</button>
        </div>
        <div class="dialog-body">
            <p>Do you want to delete all markers from the sample?</p>
        </div>
        <div class="dialog-footer">
            <button id="delete-markers-cancel">Cancel</button>
            <button id="delete-markers-ok">OK</button>
        </div>
    </div>
</div>
