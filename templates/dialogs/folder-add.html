<!-- Folder add dialog -->
<div id="folder-dialog-overlay" class="dialog-overlay hidden">
    <div id="folder-dialog" class="dialog-card">
        <div class="dialog-header">
            <span>Add Scan Folder</span>
            <button id="folder-dialog-close" class="dialog-close-btn" title="Close">&times;</button>
        </div>
        <div class="dialog-body">
            <div>
                <div class="dialog-field-label">Path</div>
                <input type="text" id="folder-path-input" placeholder="/path/to/samples" autocomplete="off" spellcheck="false">
            </div>
        </div>
        <div class="dialog-footer">
            <button id="folder-dialog-cancel">Cancel</button>
            <button id="folder-dialog-ok" disabled>OK</button>
        </div>
    </div>
</div>
