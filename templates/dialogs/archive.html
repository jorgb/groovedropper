<!-- Archive confirmation dialog -->
<div id="archive-dialog-overlay" class="dialog-overlay hidden">
    <div id="archive-dialog" class="dialog-card">
        <div class="dialog-header">
            <span><i class="fa-solid fa-skull" id="archive-dialog-skull">&nbsp;</i>Archive sample?</span>
            <button id="archive-dialog-close" class="dialog-close-btn" title="Close">&times;</button>
        </div>
        <div class="dialog-body">
            <p id="archive-dialog-msg"></p>
        </div>
        <div class="dialog-footer">
            <button id="archive-dialog-cancel">Cancel</button>
            <button id="archive-dialog-ok">Archive</button>
        </div>
    </div>
</div>
