<!-- First-run overlay -->
<div id="first-run-overlay">
    <div id="first-run-card">
        <h2 id="first-run-heading">Welcome to GrooveDropper</h2>
        <ol id="first-run-steps">
            <li>Click <strong>Add Folder</strong> and choose a directory of WAV samples</li>
            <li>Wait for the scanner to finish indexing</li>
            <li>Press <strong>Space</strong> or <strong>R</strong> to start browsing</li>
        </ol>
        <button id="first-run-dismiss">Got it</button>
    </div>
</div>
