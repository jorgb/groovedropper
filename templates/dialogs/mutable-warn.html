<!-- Mutable-warn confirmation dialog -->
<div id="mutable-warn-overlay" class="dialog-overlay hidden">
    <div id="mutable-warn-dialog" class="dialog-card">
        <div class="dialog-header">
            <span><i class="fa-solid fa-skull" style="color:var(--accent-color);margin-right:6px;"></i>Enable mutability?</span>
            <button id="mutable-warn-close" class="dialog-close-btn" title="Close">&times;</button>
        </div>
        <div class="dialog-body">
            <p>Turning mutability on will allow Groovedropper to rename samples and write new samples to your library (archive and cut features). Groovedropper will never delete files. Are you sure?</p>
        </div>
        <div class="dialog-footer">
            <button id="mutable-warn-cancel">Cancel</button>
            <button id="mutable-warn-ok">OK</button>
        </div>
    </div>
</div>
