<!-- Sample Cut / Merge Dialog -->
<div id="cut-dialog-overlay" class="dialog-overlay hidden">
    <div id="cut-dialog" class="dialog-card">
        <div class="dialog-header">
            <span>Cut / Merge sample</span>
            <button id="cut-dialog-close" class="dialog-close-btn" title="Close">&times;</button>
        </div>
        <div class="dialog-body">
            <div id="cut-waveform-wrap">
                <img id="cut-dialog-waveform" src="/static/img/waveform_placeholder.png" alt="Waveform" />
                <!-- marker lines and region overlays injected by JS -->
            </div>
            <div id="cut-inherit-labels-row" style="margin:8px 0 0;display:flex;align-items:center;gap:8px;">
                <input type="checkbox" id="cut-inherit-labels">
                <label for="cut-inherit-labels" style="color:var(--muted);cursor:pointer;user-select:none;">Use tags from original sample</label>
            </div>
            <p id="cut-region-status" style="margin:6px 0 0;font-size:1em;color:var(--muted);"></p>
            <table style="margin:8px 0 0;font-size:0.9em;color:var(--muted);border-collapse:collapse;">
                <tr>
                    <td style="padding:2px 10px 2px 0;white-space:nowrap;"><i class="fa-solid fa-scissors"></i> <strong>Cut</strong></td>
                    <td style="padding:2px 0;">Each kept section becomes a new WAV file.</td>
                </tr>
                <tr>
                    <td style="padding:2px 10px 2px 0;white-space:nowrap;"><i class="fa-solid fa-layer-group"></i> <strong>Merge</strong></td>
                    <td style="padding:2px 0;">All kept sections are joined into one WAV; excluded sections are removed, crossfaded at each join.</td>
                </tr>
                <tr>
                    <td colspan="2" style="padding:4px 0 0;">The original file is renamed / archived (.bak) in both cases.</td>
                </tr>
            </table>
        </div>
        <div class="dialog-footer">
            <button id="cut-dialog-cancel" class="panel-icon-btn">Cancel</button>
            <button id="cut-dialog-merge"  class="panel-icon-btn" disabled><i class="fa-solid fa-layer-group"></i> Merge</button>
            <button id="cut-dialog-cut"    class="panel-icon-btn" disabled><i class="fa-solid fa-scissors"></i> Cut</button>
        </div>
    </div>
</div>
